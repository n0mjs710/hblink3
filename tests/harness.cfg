# Self-contained config for the routing test harness. Defines two HBP servers,
# one HBP outbound peer, and two OpenBridges so scenarios can exercise every
# source/target combination (HBP<->HBP, HBP<->OBP, OBP<->OBP). Ports/IPs are
# never bound -- the harness drives dmrd_received directly and captures
# send_system.

[GLOBAL]
PATH: ./
PING_TIME: 5
MAX_MISSED: 3
USE_ACL: False
REG_ACL: PERMIT:ALL
SUB_ACL: PERMIT:ALL
TGID_TS1_ACL: PERMIT:ALL
TGID_TS2_ACL: PERMIT:ALL

[REPORTS]
REPORT: False
REPORT_INTERVAL: 60
REPORT_PORT: 4321
REPORT_CLIENTS: 127.0.0.1

[LOGGER]
LOG_FILE: /dev/null
LOG_HANDLERS: null
LOG_LEVEL: CRITICAL
LOG_NAME: HBlink

[ALIASES]
TRY_DOWNLOAD: False
PATH: ./
PEER_FILE: peer_ids.json
SUBSCRIBER_FILE: subscriber_ids.json
TGID_FILE: talkgroup_ids.json
PEER_URL: https://www.radioid.net/static/rptrs.json
SUBSCRIBER_URL: https://www.radioid.net/static/users.json
STALE_DAYS: 7

[SERVER-1]
MODE: SERVER
ENABLED: True
REPEAT: True
MAX_REPEATERS: 10
IP: 0.0.0.0
PORT: 54001
PASSPHRASE: passw0rd
GROUP_HANGTIME: 5
USE_ACL: False
REG_ACL: PERMIT:ALL
SUB_ACL: PERMIT:ALL
TGID_TS1_ACL: PERMIT:ALL
TGID_TS2_ACL: PERMIT:ALL

[SERVER-2]
MODE: SERVER
ENABLED: True
REPEAT: True
MAX_REPEATERS: 10
IP: 0.0.0.0
PORT: 54002
PASSPHRASE: passw0rd
GROUP_HANGTIME: 5
USE_ACL: False
REG_ACL: PERMIT:ALL
SUB_ACL: PERMIT:ALL
TGID_TS1_ACL: PERMIT:ALL
TGID_TS2_ACL: PERMIT:ALL

[REPEATER-1]
MODE: OUTBOUND
ENABLED: True
LOOSE: False
IP: 0.0.0.0
PORT: 54003
SERVER_IP: 127.0.0.1
SERVER_PORT: 54001
PASSPHRASE: homebrew
CALLSIGN: W1ABC
RADIO_ID: 312000
RX_FREQ: 449000000
TX_FREQ: 444000000
TX_POWER: 25
COLORCODE: 1
SLOTS: 1
LATITUDE: 38.0000
LONGITUDE: -095.0000
HEIGHT: 75
LOCATION: Anywhere, USA
DESCRIPTION: harness peer
URL: www.w1abc.org
SOFTWARE_ID: 20170620
PACKAGE_ID: MMDVM_HBlink
GROUP_HANGTIME: 5
OPTIONS:
USE_ACL: False
SUB_ACL: PERMIT:ALL
TGID_TS1_ACL: PERMIT:ALL
TGID_TS2_ACL: PERMIT:ALL

[OBP-1]
MODE: OPENBRIDGE
ENABLED: True
IP: 0.0.0.0
PORT: 62031
NETWORK_ID: 3129100
PASSPHRASE: password
TARGET_IP: 127.0.0.1
TARGET_PORT: 62041
BOTH_SLOTS: False
USE_ACL: False
SUB_ACL: PERMIT:ALL
TGID_ACL: PERMIT:ALL

[OBP-2]
MODE: OPENBRIDGE
ENABLED: True
IP: 0.0.0.0
PORT: 62032
NETWORK_ID: 3129200
PASSPHRASE: password
TARGET_IP: 127.0.0.1
TARGET_PORT: 62042
BOTH_SLOTS: False
USE_ACL: False
SUB_ACL: PERMIT:ALL
TGID_ACL: PERMIT:ALL
