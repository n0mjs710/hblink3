# HBlink3 main configuration.  Full field reference: CONFIGURING.md   ACL guide: ACLS.md
#
# NOTE: every [SECTION] name below is referenced by rules.py. If a name in rules.py has
# no matching system here, bridge.py will NOT start. Keep the two files in sync.
#
# [GLOBAL] — program-wide timers plus the global ACLs (run before per-system ACLs;
# both must pass). ACL format: ACTION:list, e.g. PERMIT:ALL, DENY:1, DENY:1-2000,17.
# Leave PATH alone unless you must change it.
[GLOBAL]
PATH: ./
PING_TIME: 5
MAX_MISSED: 3
# Chronic connectivity monitoring (optional; these defaults apply if omitted).
# The dashboard reports each repeater's ping loss -- the percentage of its
# expected keepalive pings that went missing -- over the last PING_LOSS_WINDOW
# minutes (1-60; larger = smoother/longer memory), and turns a repeater's
# callsign gold at or above PING_LOSS_WARN percent. This catches a repeater that
# stays connected but has a lossy link (choppy/dropped audio). 0 disables the
# gold flag. A repeater that simply pings less often is not counted as lossy.
PING_LOSS_WINDOW: 5
PING_LOSS_WARN: 5
USE_ACL: True
REG_ACL: PERMIT:ALL
SUB_ACL: DENY:1
TGID_TS1_ACL: PERMIT:ALL
TGID_TS2_ACL: PERMIT:ALL


# [REPORTS] — newline-delimited JSON event/stat feed for the dashboard (dashboard/).
# Leave REPORT True; set REPORT_PORT to match the dashboard's HBLINK_PORT and point
# REPORT_CLIENTS at the dashboard host (comma-separated IPs, or a single * for all).
# Full reference: CONFIGURING.md.
[REPORTS]
REPORT: True
REPORT_INTERVAL: 10
REPORT_PORT: 4321
REPORT_CLIENTS: 127.0.0.1


# [LOGGER] — LOG_HANDLERS: null|console|console-timed|file|file-timed|syslog
# (comma-join, no spaces). LOG_LEVEL: DEBUG|INFO|WARNING|CRITICAL. Under systemd,
# set LOG_FILE: /dev/null with a console handler and just rely on the journal.
# Full reference: CONFIGURING.md.
[LOGGER]
LOG_FILE: /tmp/hblink.log
LOG_HANDLERS: console-timed
LOG_LEVEL: DEBUG
LOG_NAME: HBlink

# [ALIASES] — DMR-ID -> callsign lookups. The DASHBOARD owns these files: set
# TRY_DOWNLOAD: False here and point PATH at the dashboard's directory. Loading the full
# subscriber DB here costs ~500 MB RAM per process (>1 GB if the dashboard loads it too),
# so keep USE_ALIASES: False unless the DB has been filtered small (dashboard
# FILTER_COUNTRIES). Full reference incl. the memory warning: CONFIGURING.md.
[ALIASES]
USE_ALIASES: False
TRY_DOWNLOAD: False
PATH: dashboard/
PEER_FILE: peer_ids.json
SUBSCRIBER_FILE: subscriber_ids.json
TGID_FILE: talkgroup_ids.json
PEER_URL: https://www.radioid.net/static/rptrs.json
SUBSCRIBER_URL: https://www.radioid.net/static/users.json
STALE_DAYS: 7

# [OPENBRIDGE] — Server-to-Server link (e.g. BrandMeister, IPSC2). Duplicate for more.
# TARGET_IP/PORT = far server; PASSPHRASE = shared HMAC key (must match both ends);
# NETWORK_ID identifies this server. All traffic is TS1 (no registration).
#   BOTH_SLOTS: True is HBlink-to-HBlink ONLY -- no other server is known to accept it.
#   PRESERVE_SOURCE_PEER: True forwards the originating peer ID instead of NETWORK_ID
#     (unvalidated field; improves call provenance; best when both ends enable it).
# Full reference: CONFIGURING.md.
[OBP-1]
MODE: OPENBRIDGE
ENABLED: True
IP: 0.0.0.0
PORT: 62035
NETWORK_ID: 3129100
PASSPHRASE: password
TARGET_IP: 1.2.3.4
TARGET_PORT: 62035
BOTH_SLOTS: True
PRESERVE_SOURCE_PEER: False
USE_ACL: True
SUB_ACL: DENY:1
TGID_ACL: PERMIT:ALL

# [SERVER] — you are the Server; Clients (repeaters/hotspots) connect in. Duplicate for
# more. IP may NOT be blank (0.0.0.0 or :: = all interfaces); PORT must be unique/unused.
# REPEAT: True repeats between connected Clients; MAX_REPEATERS caps connections.
# Full reference: CONFIGURING.md.
[SERVER-1]
MODE: SERVER
ENABLED: True
REPEAT: True
MAX_REPEATERS: 10
IP: 0.0.0.0
PORT: 54000
PASSPHRASE: s3cr37w0rd
GROUP_HANGTIME: 5
USE_ACL: True
REG_ACL: DENY:1
SUB_ACL: DENY:1
TGID_TS1_ACL: PERMIT:ALL
TGID_TS2_ACL: PERMIT:ALL

# [OUTBOUND] — you are a Client: HBlink masquerades as a repeater/hotspot and dials out
# to a Server. Duplicate for more. RX/TX_FREQ in Hz; LAT/LONG in decimal degrees; HEIGHT
# in meters. LOOSE: True relaxes validation for non-compliant Servers (XLXD, DMR+).
#   NOTE: BrandMeister does NOT accept OUTBOUND/Client connections -- it requires OpenBridge.
# Full reference: CONFIGURING.md.
[OUTBOUND-1]
MODE: OUTBOUND
ENABLED: True
LOOSE: False
IP: 0.0.0.0
PORT: 54001
SERVER_IP: 172.16.1.1
SERVER_PORT: 54000
PASSPHRASE: homebrew
CALLSIGN: W1ABC
RADIO_ID: 312000
RX_FREQ: 449000000
TX_FREQ: 444000000
TX_POWER: 25
COLORCODE: 1
SLOTS: 1
LATITUDE: 38.0000
LONGITUDE: -095.0000
HEIGHT: 75
LOCATION: Anywhere, USA
DESCRIPTION: This is a cool repeater
URL: www.w1abc.org
SOFTWARE_ID: 20170620
PACKAGE_ID: MMDVM_HBlink
GROUP_HANGTIME: 5
OPTIONS:
USE_ACL: True
SUB_ACL: DENY:1
TGID_TS1_ACL: PERMIT:ALL
TGID_TS2_ACL: PERMIT:ALL
