# PROGRAM-WIDE PARAMETERS GO HERE
# PATH - working path for files, leave it alone unless you NEED to change it
# PING_TIME - the interval that outbound clients will ping the server, and re-try registration
#           - how often the server maintenance loop runs
# MAX_MISSED - how many pings are missed before we give up and re-register
#           - number of times the server maintenance loop runs before de-registering a repeater
#
# ACLs — filter traffic by radio/talkgroup ID. They are cheap; use them freely.
# See ACLS.md for the full guide with examples.
#   Format: ACTION:entry,entry,...  (ACTION is PERMIT or DENY)
#           entries are single IDs, ranges like 1-2999, or ALL
#   PERMIT:list allows only those, denies the rest (whitelist)
#   DENY:list   denies those, allows the rest (blacklist)   e.g. DENY:1,1000-2000,17
#   Types: REG_ACL (repeater registration, SERVER only, ALWAYS enforced),
#          SUB_ACL (subscriber IDs), TGID_TS1_ACL / TGID_TS2_ACL (talkgroup by slot)
# GLOBAL ACLs run before per-system ACLs; both must pass. USE_ACL: False skips the
# SUB/TGID checks (REG_ACL stays enforced). Keys must still be present — set unused
# ones to PERMIT:ALL. The global TGID_TS1_ACL also filters OpenBridge (all TS1).
[GLOBAL]
PATH: ./
PING_TIME: 5
MAX_MISSED: 3
USE_ACL: True
REG_ACL: PERMIT:ALL
SUB_ACL: DENY:1
TGID_TS1_ACL: PERMIT:ALL
TGID_TS2_ACL: PERMIT:ALL


# NETWORK REPORTING CONFIGURATION
#   Enabling "REPORT" opens a TCP socket that streams newline-delimited JSON
#   (a config/bridge snapshot plus live call events) to any connected consumer,
#   such as the web dashboard in dashboard/. Leave REPORT True; point a consumer
#   at the loopback if you aren't using it.
#
#   REPORT          - True to enable the reporting feed, False to disable
#   REPORT_INTERVAL - Seconds between config/bridge snapshots. Live CALLS are
#                     pushed instantly; this only sets how often system/repeater state
#                     is refreshed. Use ~10 for dashboard use.
#   REPORT_PORT     - TCP port the feed listens on (must match the dashboard's
#                     HBLINK_PORT)
#   REPORT_CLIENTS  - comma-separated list of consumer IPs allowed to connect
#                     (the dashboard host); a single * allows all
[REPORTS]
REPORT: True
REPORT_INTERVAL: 10
REPORT_PORT: 4321
REPORT_CLIENTS: 127.0.0.1


# SYSTEM LOGGER CONFIGURAITON
#   This allows the logger to be configured without chaning the individual
#   python logger stuff. LOG_FILE should be a complete path/filename for *your*
#   system -- use /dev/null for non-file handlers.
#   LOG_HANDLERS may be any of the following, please, no spaces in the
#   list if you use several:
#       null
#       console
#       console-timed
#       file
#       file-timed
#       syslog
#   LOG_LEVEL may be any of the standard syslog logging levels, though
#   as of now, DEBUG, INFO, WARNING and CRITICAL are the only ones
#   used.
#
[LOGGER]
LOG_FILE: /tmp/hblink.log
LOG_HANDLERS: console-timed
LOG_LEVEL: DEBUG
LOG_NAME: HBlink

# SUBSCRIBER, REPEATER and TGID ALIAS LOOKUPS
#
# *** IMPORTANT: The dashboard is the canonical owner of alias files. ***
# *** Set TRY_DOWNLOAD: False here and let the dashboard download,    ***
# *** store, and refresh them. Loading subscriber_ids.json here costs ***
# *** 500+ MB of of RAM per bridge process — avoid it if you can.     ***
#
# If you still want callsigns in the bridge log, set PATH to your
# dashboard's directory (e.g. dashboard/) and leave TRY_DOWNLOAD: False —
# the dashboard keeps the files current and the bridge just reads them.
# STALE_DAYS is only relevant when TRY_DOWNLOAD: True.
[ALIASES]
USE_ALIASES: False
TRY_DOWNLOAD: False
PATH: dashboard/
PEER_FILE: peer_ids.json
SUBSCRIBER_FILE: subscriber_ids.json
TGID_FILE: talkgroup_ids.json
PEER_URL: https://www.radioid.net/static/rptrs.json
SUBSCRIBER_URL: https://www.radioid.net/static/users.json
STALE_DAYS: 7

# OPENBRIDGE INSTANCES - DUPLICATE SECTION FOR MULTIPLE CONNECTIONS
# OpenBridge (from DMR+) connects HBlink to a Brandmeister or IPSC2 server.
# TARGET_IP / TARGET_PORT are the far server; PASSPHRASE is the shared password
# agreed with its operator; NETWORK_ID is a DMR-Radio-ID-format number that
# identifies this connection. Naming the system after the far server's ID is
# convention, not required. Other parameters follow the other system types.
#
# ACLs: OpenBridge does not register, so REG_ACL is meaningless, and all traffic
# is TS1 (filtered by the global TGID_TS1_ACL). BOTH_SLOTS: True lets OPB use both
# slots for unit calls only. Otherwise ACLs work as in the GLOBAL stanza.
#
# PRESERVE_SOURCE_PEER (default False): The DMRD "Repeater ID" field (bytes 11-14)
# is required by the data protocol, and OpenBridge convention says to fill it with
# THIS server's NETWORK_ID -- but the protocol does not define how a receiver uses
# it, and the reference implementation does not validate it (authentication is the
# HMAC plus the source socket; the field is used only for logging/reporting).
# Setting True stops overwriting it, so the ORIGINATING repeater/peer ID rides
# through intact -- better provenance for isolating a call's true RF source across
# the network. Leave it False for spec-conventional behavior (stamp NETWORK_ID).
# Most useful when both ends of the link enable it. Since RadioID does not issue IDs
# to infrastructure servers, an arbitrary NETWORK_ID that propagates like a repeater
# ID is arguably worse than preserving the real one.
[OBP-1]
MODE: OPENBRIDGE
ENABLED: True
IP: 0.0.0.0
PORT: 62035
NETWORK_ID: 3129100
PASSPHRASE: password
TARGET_IP: 1.2.3.4
TARGET_PORT: 62035
BOTH_SLOTS: True
PRESERVE_SOURCE_PEER: False
USE_ACL: True
SUB_ACL: DENY:1
TGID_ACL: PERMIT:ALL

# SERVER INSTANCES - DUPLICATE SECTION FOR MULTIPLE SERVERS
# HomeBrew Protocol Server instances. IP may NOT be blank — use 0.0.0.0 or :: to
# listen on all interfaces. PORT must be unique and unused. REPEAT: True repeats
# traffic to connected repeaters. MAX_REPEATERS caps simultaneous connections —
# handy for hotspots or limited hardware like a Raspberry Pi.
#
# ACLs: see the GLOBAL stanza.
[SERVER-1]
MODE: SERVER
ENABLED: True
REPEAT: True
MAX_REPEATERS: 10
IP: 0.0.0.0
PORT: 54000
PASSPHRASE: s3cr37w0rd
GROUP_HANGTIME: 5
USE_ACL: True
REG_ACL: DENY:1
SUB_ACL: DENY:1
TGID_TS1_ACL: PERMIT:ALL
TGID_TS2_ACL: PERMIT:ALL

# OUTBOUND INSTANCES - DUPLICATE SECTION FOR MULTIPLE OUTBOUND CLIENTS
# Most items are strings the program handles as-is. RX_FREQ/TX_FREQ are in Hz;
# LATITUDE/LONGITUDE are decimal degrees; HEIGHT is in meters. LOOSE: True relaxes
# validation of packets from the server, allowing connection to non-compliant
# systems such as XLXD or DMR+.
#
# ACLs: see the GLOBAL stanza.
[OUTBOUND-1]
MODE: OUTBOUND
ENABLED: True
LOOSE: False
IP: 0.0.0.0
PORT: 54001
SERVER_IP: 172.16.1.1
SERVER_PORT: 54000
PASSPHRASE: homebrew
CALLSIGN: W1ABC
RADIO_ID: 312000
RX_FREQ: 449000000
TX_FREQ: 444000000
TX_POWER: 25
COLORCODE: 1
SLOTS: 1
LATITUDE: 38.0000
LONGITUDE: -095.0000
HEIGHT: 75
LOCATION: Anywhere, USA
DESCRIPTION: This is a cool repeater
URL: www.w1abc.org
SOFTWARE_ID: 20170620
PACKAGE_ID: MMDVM_HBlink
GROUP_HANGTIME: 5
OPTIONS:
USE_ACL: True
SUB_ACL: DENY:1
TGID_TS1_ACL: PERMIT:ALL
TGID_TS2_ACL: PERMIT:ALL
